name: Path Changes
on:
  workflow_call:
    outputs:
      gh_actions:
        value: ${{ jobs.changes.outputs.gh_actions }}
      go_code:
        value: ${{ jobs.changes.outputs.go_code }}
      go_deps:
        value: ${{ jobs.changes.outputs.go_deps }}
permissions:
  contents: read
defaults:
  run:
    shell: bash
jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      gh_actions: ${{ steps.filter.outputs.gh_actions }}
      go_code: ${{ steps.filter.outputs.go_code }}
      go_deps: ${{ steps.filter.outputs.go_deps }}
    steps:
      - name: Check out code
        if: github.event_name != 'pull_request'
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Filter changed paths
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        id: filter
        with:
          filters: |
            gh_actions:
              - .github/actions/**
              - .github/workflows/**

            go_code: &go_code
              - .github/actions/setup-go/action.yaml
              - .github/workflows/pr.yaml
              - cmd/**
              - .golangci.yaml
              - go.mod
              - go.sum

            go_deps:
              - .github/actions/setup-go/action.yaml
              - .github/workflows/cache.yaml
              - go.mod
              - go.sum
