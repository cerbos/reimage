name: Cache dependencies

on:
  push:
    branches:
      - main
permissions:
  contents: read

jobs:
  changes:
    uses: ./.github/workflows/path-changes.yaml

  cache-go-deps:
    name: Cache Go dependencies and tests
    needs: changes
    if: ${{ needs.changes.outputs.go_deps == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          lfs: true

      - name: Fix mtimes for Go test cache
        run:
          go run hack/ci/update-mtime/main.go

      - name: Install Go and dependencies
        id: setup-go
        uses: ./.github/actions/setup-go

      - name: Build caches
        if: ${{ steps.setup-go.outputs.cache-hit != 'true' }}
        env:
          CGO_ENABLED: "0"
        run: "go build ./... && go test -run=ignore  ./... > /dev/null"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: latest
          args: '--config=.golangci.yaml'

      - name: Write go cache
        id: cache
        uses: actions/cache/save@8b402f58fbc84540c8b491a91e594a4576fec3d7
        with:
          path: ${{ steps.setup-go.outputs.cache-paths }}
          key: ${{ steps.setup-go.outputs.cache-key }}
